{% extends "base.html" %}
{% block content %}
  <h2>My Projects</h2>
  <ul>
    {% for project in projects %}
      <li><a href="{% url 'client_portal:project_detail' project.pk %}">{{ project.name }}</a> - {{ project.status }}</li>
    {% empty %}
      <li>No projects found.</li>
    {% endfor %}
  </ul>
{% endblock %}
