{% extends 'base.html' %}
{% load static %}

{% block content %}
<!-- Account Dashboard -->
<section class="section" style="background-color: #f8f9fa;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8">

        <div class="card shadow-sm p-5 rounded-4">
          <h2 class="fw-bold mb-3" style="color: #333;">Welcome, {{ user.username }}!</h2>
          <p class="text-muted mb-4" style="font-size: 15px;">This is your account dashboard.</p>

          <ul class="list-group list-group-flush">
            <li class="list-group-item">
              <a href="{% url 'accounts:profile' %}" class="text-decoration-none" style="color: #db5e2c;">👤 My Profile</a>
            </li>
            <li class="list-group-item">
              <a href="{% url 'accounts:edit_profile' %}" class="text-decoration-none" style="color: #db5e2c;">✏️ Edit Profile</a>
            </li>
            <li class="list-group-item">
              <a href="{% url 'client_portal:client_portal-home' %}" class="text-decoration-none" style="color: #db5e2c;">📁 Client Portal</a>
            </li>
            <li class="list-group-item">
              <a href="/quotes/" class="text-decoration-none" style="color: #db5e2c;">💬 My Quotes</a>
            </li>
            <li class="list-group-item">
              <a href="{% url 'accounts:logout' %}" class="text-decoration-none" style="color: #db5e2c;">🚪 Logout</a>
            </li>
          </ul>

        </div>

      </div>
    </div>
  </div>
</section>
{% endblock %}
