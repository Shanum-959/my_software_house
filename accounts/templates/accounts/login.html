{% extends 'base.html' %}
{% block content %}
<h2>Login</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Login</button>
</form>

<p><a href="{% url 'accounts:password_reset' %}">Forgot password?</a></p>

<p>Don't have an account? <a href="{% url 'accounts:signup' %}">Sign up</a></p>
{% endblock %}
