{% extends 'core/base.html' %}

{% block content %}
<h2>Our Blog</h2>
{% for post in posts %}
    <div class="blog-post">
    <h3><a href="{% url 'blog:blog_detail' slug=post.slug %}">{{ post.title }}</a></h3>
        <p>{{ post.content|truncatewords:20 }}</p>
    </div>
{% endfor %}


{% endblock %}
