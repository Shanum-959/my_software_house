{% extends 'base.html' %}

{% block content %}
    <div class="blog-detail">
        <h2>{{ post.title }}</h2>
        <p><strong>Author:</strong> {{ post.author }}</p>
        <p><strong>Published:</strong> {{ post.published_at|date:"F j, Y" }}</p>

        {% if post.image %}
            <img src="{{ post.image.url }}" alt="{{ post.title }}" style="max-width: 100%;">
        {% endif %}

        <div class="content">
            {{ post.content|linebreaks }}
        </div>

        <a href="{% url 'blog:blog_home' %}">← Back to Blog</a>
    </div>
{% endblock %}
