{% extends "base.html" %}
{% block content %}
<!-- Password Reset Complete -->
<section class="section">
  <div class="container">
    <div class="text-center mb-5">
      <h2 class="h2-page" style="color: var(--primary);">Password Reset Complete</h2>
    </div>
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm p-4 rounded-4 h-100">
          <div class="text-center">
            <p class="body">
              Your password has been reset successfully.
              You can now <a href="{% url 'accounts:login' %}" style="color: var(--primary); text-decoration: underline;">log in</a> to your account.
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
