{% extends 'base.html' %}
{% load static %}

{% block content %}
<main>
  <section class="section" aria-labelledby="thankyou-heading" tabindex="-1">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
          <div class="card shadow-sm p-4 rounded-4 h-100 text-center" role="region" aria-live="polite" aria-describedby="thankyou-desc">
            <h1 id="thankyou-heading" class="h2-page" style="color: var(--primary);">Thank You!</h1>
            <p id="thankyou-desc" class="body">
              Your message has been sent successfully. We’ll get back to you soon.
            </p>
            <a href="{% url 'contact_form' %}" class="btn btn-primary" role="button" aria-label="Back to Contact Form">
              ← Back to Contact Form
            </a>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>
{% endblock %}
